<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="robots" content="noindex,nofollow">
<title>Stato installazione — PEE Field</title>
<style>
* { box-sizing: border-box; }
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-2: #334155;
  --border: #475569;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --text-dim: #cbd5e1;
  --accent: #38bdf8;
  --ok: #22c55e;
  --pending: #f59e0b;
  --done: #38bdf8;
  --ready: #a855f7;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: ui-monospace, 'SF Mono', Menlo, monospace;
}
html, body {
  margin: 0; padding: 0; height: 100%;
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 15px; line-height: 1.5;
}
.wrap { max-width: 540px; margin: 0 auto; padding: 24px 18px 48px; }
.hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; font-size: 13px; color: var(--text-muted); }
.hdr-mark { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); flex-shrink: 0; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 20px;
}
.pv-line { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
.pv-lbl { font-size: 11px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
.pv-num { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text); }
.pv-where { font-size: 17px; font-weight: 500; margin-bottom: 14px; }
.pv-addr { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; word-break: break-word; }
.pv-rag { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }

.status-pill {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .02em;
  margin-bottom: 22px;
}
.status-pill.tone-ok { background: rgba(34,197,94,.18); color: var(--ok); }
.status-pill.tone-ready { background: rgba(168,85,247,.18); color: var(--ready); }
.status-pill.tone-done { background: rgba(56,189,248,.18); color: var(--done); }
.status-pill.tone-pending { background: rgba(245,158,11,.18); color: var(--pending); }

.timeline { margin-top: 8px; }
.tl-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--surface-2); }
.tl-row:last-child { border-bottom: none; }
.tl-dot { width: 10px; height: 10px; border-radius: 999px; background: var(--ok); flex-shrink: 0; margin-top: 5px; }
.tl-body { flex: 1; }
.tl-label { font-size: 14px; color: var(--text); }
.tl-ts { font-size: 12px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }

.empty {
  text-align: center;
  padding: 48px 16px;
  color: var(--text-muted);
  font-size: 14px;
}
.empty-emoji { font-size: 40px; margin-bottom: 12px; }

.footer {
  margin-top: 28px;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
}
.footer-mono { font-family: var(--mono); }

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f8fafc; --surface: #fff; --surface-2: #e2e8f0; --border: #cbd5e1;
    --text: #0f172a; --text-muted: #64748b; --text-dim: #475569;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <span class="hdr-mark"></span>
    <span>Stato installazione punto vendita</span>
  </div>
  <div id="content">
    <div class="empty">
      <div class="empty-emoji">⏳</div>
      <div>Caricamento…</div>
    </div>
  </div>
  <div class="footer">
    Stato aggiornato in tempo reale dal team sul campo.<br>
    <span class="footer-mono">PEE Field</span>
  </div>
</div>

<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const token = params.get('t');
  const content = document.getElementById('content');

  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });
  }
  function fmtSync(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' }) +
      ' alle ' + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  }
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function renderError(msg) {
    content.innerHTML = '<div class="empty">' +
      '<div class="empty-emoji">⚠️</div>' +
      '<div>' + escapeHtml(msg) + '</div></div>';
  }

  if (!token || !/^[a-f0-9]{24,64}$/i.test(token)) {
    renderError('Link non valido. Contatta chi te lo ha inviato.');
    return;
  }

  let data;
  try {
    const resp = await fetch('/.netlify/functions/pv-public?t=' + encodeURIComponent(token));
    if (resp.status === 404) {
      renderError('Questo link è stato revocato o è scaduto.');
      return;
    }
    if (!resp.ok) {
      renderError('Impossibile caricare lo stato (errore ' + resp.status + ').');
      return;
    }
    data = await resp.json();
  } catch (err) {
    renderError('Errore di rete. Riprova più tardi.');
    return;
  }

  const snap = data.snapshot || {};
  const whereParts = [snap.comune, snap.prov ? '(' + snap.prov + ')' : ''].filter(Boolean).join(' ');
  const tone = 'tone-' + (data.statusTone || 'pending');

  const milestonesHtml = (data.milestones || []).length
    ? '<div class="timeline">' + data.milestones.map(m =>
        '<div class="tl-row">' +
          '<div class="tl-dot"></div>' +
          '<div class="tl-body">' +
            '<div class="tl-label">' + escapeHtml(m.label) + '</div>' +
            '<div class="tl-ts">' + escapeHtml(fmtDate(m.ts)) + '</div>' +
          '</div>' +
        '</div>'
      ).join('') + '</div>'
    : '<div style="padding:14px 0;color:var(--text-muted);font-size:13px">Nessuna attività registrata ancora.</div>';

  content.innerHTML =
    '<div class="card">' +
      '<div class="pv-line"><span class="pv-lbl">PV</span><span class="pv-num">' + escapeHtml(String(data.pv)) + '</span></div>' +
      '<div class="pv-where">' + escapeHtml(whereParts) + '</div>' +
      (snap.indirizzo ? '<div class="pv-addr">' + escapeHtml(snap.indirizzo) + '</div>' : '') +
      (snap.ragSoc ? '<div class="pv-rag">' + escapeHtml(snap.ragSoc) + '</div>' : '') +
      '<span class="status-pill ' + tone + '">' + escapeHtml(data.statusLabel || '—') + '</span>' +
      milestonesHtml +
    '</div>' +
    '<div class="footer" style="margin-top:16px">' +
      'Ultimo aggiornamento del team: <span class="footer-mono">' + escapeHtml(fmtSync(data.syncedAt)) + '</span>' +
    '</div>';
})();
</script>
</body>
</html>
