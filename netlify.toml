[build]
  publish = "."

# Security headers per tutti i file (no override del Cache-Control qui:
# regole più specifiche sotto gestiscono la cache per path).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Entry point HTML — no-store: Safari/iOS a volte tiene in bfcache la pagina anche
# con must-revalidate. Con no-store il browser NON è autorizzato a memorizzarla
# del tutto, quindi è obbligato a scaricarla nuova ad ogni apertura.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

# Dati e manifest — stesso trattamento dell'HTML: no-store così dopo un deploy
# il dataset aggiornato arriva subito su qualunque browser.
[[headers]]
  for = "/pv_data.json"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-store"

# Icone/favicon — cambiano raramente; 1 giorno è un buon compromesso fra
# riduzione richieste e propagazione di eventuali modifiche.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Difesa: se per errore venisse rideployato un service worker vecchio,
# vogliamo che il browser non lo cachi mai e lo possa disinstallare.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store"
