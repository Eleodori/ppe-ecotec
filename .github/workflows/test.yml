name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # I test della logica core usano solo moduli built-in di Node (node:test):
      # nessun npm install necessario per i test.
      - name: Unit tests (core logic)
        run: node --test tests/*.test.js
      - name: Syntax check Netlify Functions
        run: |
          for f in netlify/functions/*.mjs; do node --check "$f"; done

      # Tooling di qualità: ESLint + JSDoc typecheck. Dopo Fase 3 sono BLOCCANTI:
      # ogni PR deve passare lint e typecheck per essere mergiabile.
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: TypeScript JSDoc check
        run: npm run typecheck
